name: CI

on:
  pull_request:
  push:
    branches: ["main"]

jobs:
  test:
    name: test (windows, python 3.10)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure Python 3.10 is available
        shell: pwsh
        run: |
          py -3.10 --version

      - name: Create venv with Python 3.10
        shell: pwsh
        run: |
          py -3.10 -m venv .venv

      - name: Use venv Python
        shell: pwsh
        run: |
          .\.venv\Scripts\python.exe --version

      - name: Install dev tooling in venv
        shell: pwsh
        run: |
          .\.venv\Scripts\python.exe -m pip install --upgrade pip
          if (Test-Path requirements-dev.txt) {
              .\.venv\Scripts\python.exe -m pip install -r requirements-dev.txt
          } else {
              .\.venv\Scripts\python.exe -m pip install pip-tools pip-chill pytest
          }

      - name: Install locked runtime dependencies
        shell: pwsh
        run: |
          if (Test-Path requirements.txt) {
              .\.venv\Scripts\python.exe -m pip install -r requirements.txt
          }

      - name: Enforce requirements consistency
        shell: pwsh
        run: |
          powershell -NoProfile -ExecutionPolicy Bypass -File scripts/update_requirements.ps1
          git diff --exit-code requirements.in requirements.txt

      - name: Run tests
        shell: pwsh
        run: pytest -q --no-tests=pass -vv -ra -W default
